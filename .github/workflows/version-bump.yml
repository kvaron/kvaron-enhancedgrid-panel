name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: read-all

jobs:
  bump:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHANGELOG_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (no git tag yet)
        run: 'npm version "$BUMP_TYPE" --no-git-tag-version'
        env:
          BUMP_TYPE: ${{ inputs.bump }}

      - name: Get new version
        id: version
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Only include meaningful commits: feat, fix (not ci), perf, refactor, breaking changes
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE=""
          fi

          FEATURES=$(git log $RANGE --pretty=format:"- %s" --grep="^feat" || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s" --grep="^fix" --invert-grep --grep="^fix(ci)" --grep="^fix(deps)" || true)
          PERF=$(git log $RANGE --pretty=format:"- %s" --grep="^perf" || true)
          REFACTOR=$(git log $RANGE --pretty=format:"- %s" --grep="^refactor" || true)
          BREAKING=$(git log $RANGE --pretty=format:"- %s" --grep="BREAKING CHANGE" || true)

          # Build new entry
          ENTRY="## ${VERSION} (${DATE})"$'\n'
          [ -n "$BREAKING" ] && ENTRY="${ENTRY}"$'\n'"### Breaking Changes"$'\n'"${BREAKING}"$'\n'
          [ -n "$FEATURES" ] && ENTRY="${ENTRY}"$'\n'"### Features"$'\n'"${FEATURES}"$'\n'
          [ -n "$FIXES" ] && ENTRY="${ENTRY}"$'\n'"### Bug Fixes"$'\n'"${FIXES}"$'\n'
          [ -n "$PERF" ] && ENTRY="${ENTRY}"$'\n'"### Performance"$'\n'"${PERF}"$'\n'
          [ -n "$REFACTOR" ] && ENTRY="${ENTRY}"$'\n'"### Refactoring"$'\n'"${REFACTOR}"$'\n'

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo -e "${ENTRY}\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo "${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit, tag, and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add -A
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"
