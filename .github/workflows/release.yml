name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      id-token: write
      contents: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHANGELOG_PAT }}
          fetch-depth: 0

      - name: Verify Grafana signing token
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
        run: |
          if [ -z "$GRAFANA_ACCESS_POLICY_TOKEN" ]; then
            echo "GRAFANA_ACCESS_POLICY_TOKEN repository secret is required for tagged plugin releases."
            exit 1
          fi

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          token: ${{ secrets.CHANGELOG_PAT }}
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          attestation: true
