services:
  grafana:
    user: root
    container_name: 'kvaron-enhancedgrid-panel'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.3.1}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - ../dist:/var/lib/grafana/plugins/kvaron-enhancedgrid-panel
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/kvaron-enhancedgrid-panel

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.kvaron-enhancedgrid-panel:debug
      GF_LOG_LEVEL: info
      GF_DATAPROXY_LOGGING: 0
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: kvaron-enhancedgrid-panel
