# End-to-end OData test stack: Grafana + Infinity data source + a minimal
# OData mock server, with the Enhanced Grid panel provisioned in server-side
# OData mode. Self-contained so it doesn't disturb the default dev stack.
#
#   docker compose -f docker-compose.odata.yaml up --build
#   Grafana:  http://localhost:3001   OData:  http://localhost:8080
#
# Build the plugin first so dist/ is current:  npm run build
services:
  grafana:
    container_name: kvaron-enhancedgrid-odata
    build:
      context: ./.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-13.0.1}
        development: 'false'
        anonymous_auth_enabled: 'true'
    ports:
      - '3001:3000/tcp'
    depends_on:
      - odata
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: kvaron-enhancedgrid-panel
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GF_LOG_LEVEL: info
    volumes:
      - ./dist:/var/lib/grafana/plugins/kvaron-enhancedgrid-panel
      - ./e2e-odata/provisioning:/etc/grafana/provisioning

  odata:
    container_name: kvaron-odata-mock
    image: node:20-alpine
    working_dir: /app
    command: ['node', 'server.js']
    ports:
      - '8080:8080/tcp'
    volumes:
      - ./e2e-odata/server.js:/app/server.js:ro
